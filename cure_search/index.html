    <meta charset="utf-8" />

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet" />
    <script src="index.js"></script>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <header>
        <a class="logo" href="index.html">CURE Dataset Search</a> <!-- Link to home page -->
        <nav class="nav__links">
            <ul>
                <li><a href="../Project_Database.csv">Download All Data</a></li>
                <li><a href="../metadata/index.html">View Datasets</a></li> <!-- Placeholder link to database page -->
            </ul> 
        </nav>

    </header>

    <div class="content" style='float:left;'>
        <!-- Code for type: numbers
        <label for="numwords" style="margin-right: 5px;">
            <h4>Number</h4>
        </label>
        <input type="number" name="numwords" id='numwords' min="0" max="10000" value="1000"
            style="color:black;"></input>
        -->
        <label for="search_bar">
            <h3>Dataset Search</h3>
        </label>

        <label for="instructions" style="margin-right: 5px;">
            <span>Please enter a DOI, data accession, dataset name, or paper title to search for relevant projects and datasets.</span>
        </label>

        <label for="search_param" style="margin-right: 5px;">
            <h4>Search With:</h4>
        </label>
        <select name="search_param" id="search_param" style="color:black;">
            <option value="all">All fields</option>
            <option value="doi">DOI</option>
            <option value="data_accession">Data Accession</option>
            <option value="dataset_name">Dataset Name</option>
            <option value="paper_title">Paper Title</option>
        </select>

        <input type="text" name="search_bar" id="search_bar"
               style="color:black;margin-bottom: 5px; width:760px;"
               placeholder="Insert DOI or other search terms" />
        <button class="btn def btn-refresh" id="do" onclick="do_onclick()">
            Search
        </button>

        <p style="margin-top: 20px;">
        <h2 style="display:inline;">Results:</h2>
        </p>

        <div id="search_results"></div>
</body>
